[build]
  command   = "pnpm --filter @workspace/japanese-quiz... run build"
  publish   = "artifacts/japanese-quiz/dist/public"
  functions = "netlify/functions"

[build.environment]
  # Vite base path for a Netlify root deployment
  BASE_PATH   = "/"
  # Run functions in production mode so pino uses JSON output (not pino-pretty)
  NODE_ENV    = "production"

[functions]
  node_bundler = "esbuild"

# API routes → serverless function (must come before the SPA fallback)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
