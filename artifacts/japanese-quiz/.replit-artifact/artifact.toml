kind = "web"
previewPath = "/"
title = "Japanese Quiz"
version = "1.0.0"
id = "artifacts/japanese-quiz"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24936

[services.development]
run = "pnpm --filter @workspace/japanese-quiz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/japanese-quiz", "run", "build" ]
serve = "static"
publicDir = "artifacts/japanese-quiz/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24936"
BASE_PATH = "/"
